<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sincerely, Chi</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Patrick Hand', cursive;
      color: #2c3e50;
      background: #f6f1e9;
      background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
    }

    header {
      background: #1f2a44;
      color: #f6f1e9;
      padding: 25px;
      text-align: center;
      font-size: 28px;
      font-family: 'Playfair Display', serif;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      background: #d8cbb5;
      padding: 12px;
    }

    nav a {
      color: #1f2a44;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    nav a:hover {
      color: #c9a227;
    }

    section {
      display: none;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    section.active {
      display: block;
    }

    .card {
      background: #fffaf3;
      padding: 25px;
      margin-bottom: 25px;
      border-radius: 14px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      margin-top: 0;
    }

    textarea, input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: 'Patrick Hand', cursive;
    }

    button {
      margin-top: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #1f2a44;
      color: #fff;
      cursor: pointer;
    }

    .sticky {
      padding: 15px;
      border-radius: 10px;
      position: absolute;
      width: 180px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      cursor: grab;
    }

    .yellow { background: #fff2b2; }
    .cream { background: #fffaf3; }
    .blue { background: #dce7f3; }

    #notesContainer {
      position: relative;
      height: 400px;
      border: 1px dashed #ccc;
      margin-top: 20px;
    }

    small {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.7;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #1f2a44;
      color: #f6f1e9;
    }
  </style>
</head>
<body>

<header>Sincerely, Chi</header>

<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('notes')">Freedom Wall</a>
  <a onclick="showPage('music')">Music Room</a>
  <a onclick="showPage('future')">Future Me</a>
  <a onclick="showPage('bucket')">Bucket List</a>
  <a onclick="showPage('goals')">Goals</a>
</nav>

<section id="home" class="active">
  <div class="card">
    <h2>Welcome</h2>
    <p>This space holds my thoughts, dreams, and quiet moments.</p>
  </div>
</section>

<section id="notes">
  <div class="card">
    <h2>Freedom Wall</h2>
    <textarea id="noteInput" placeholder="Write something..."></textarea>
    <select id="colorSelect">
      <option value="yellow">Yellow</option>
      <option value="cream">Cream</option>
      <option value="blue">Soft Blue</option>
    </select>
    <button onclick="addNote()">Add Note</button>
    <div id="notesContainer"></div>
  </div>
</section>

<section id="music">
  <div class="card">
    <h2>Music Room</h2>
    <input id="songInput" placeholder="Song title or link">
    <button onclick="addSong()">Add Song</button>
    <ul id="songList"></ul>
  </div>
</section>

<section id="future">
  <div class="card">
    <h2>Future Me</h2>
    <textarea id="futureInput" placeholder="Write your future here..."></textarea>
  </div>
</section>

<section id="bucket">
  <div class="card">
    <h2>Bucket List</h2>
    <input id="bucketInput" placeholder="Something I want to do">
    <button onclick="addBucket()">Add</button>
    <ul id="bucketList"></ul>
  </div>
</section>

<section id="goals">
  <div class="card">
    <h2>Goals</h2>
    <input id="goalInput" placeholder="A goal I am working on">
    <button onclick="addGoal()">Add</button>
    <ul id="goalList"></ul>
  </div>
</section>

<footer>A quiet place to exist</footer>

<script>
  function showPage(pageId) {
    document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  }

  function loadData(key) {
    return JSON.parse(localStorage.getItem(key)) || [];
  }

  function addNote() {
    const text = document.getElementById('noteInput').value;
    const color = document.getElementById('colorSelect').value;
    if (text.trim() !== "") {
      const notes = loadData('notes');
      notes.push({ text, color, x: 20, y: 20, date: new Date().toLocaleString() });
      saveData('notes', notes);
      document.getElementById('noteInput').value = '';
      renderNotes();
    }
  }

  function renderNotes() {
    const container = document.getElementById('notesContainer');
    container.innerHTML = '';
    const notes = loadData('notes');

    notes.forEach((note, index) => {
      const div = document.createElement('div');
      div.className = 'sticky ' + note.color;
      div.style.left = note.x + 'px';
      div.style.top = note.y + 'px';
      div.innerHTML = note.text + `<small>${note.date}</small>`;

      let offsetX, offsetY;

      div.onmousedown = function(e) {
        offsetX = e.clientX - div.offsetLeft;
        offsetY = e.clientY - div.offsetTop;

        document.onmousemove = function(e) {
          div.style.left = (e.clientX - offsetX) + 'px';
          div.style.top = (e.clientY - offsetY) + 'px';
        };

        document.onmouseup = function() {
          document.onmousemove = null;
          document.onmouseup = null;

          notes[index].x = div.offsetLeft;
          notes[index].y = div.offsetTop;
          saveData('notes', notes);
        };
      };

      container.appendChild(div);
    });
  }

  function addSong() {
    const input = document.getElementById('songInput');
    if (input.value.trim() !== "") {
      const songs = loadData('songs');
      songs.push(input.value);
      saveData('songs', songs);
      input.value = '';
      renderSongs();
    }
  }

  function renderSongs() {
    const list = document.getElementById('songList');
    list.innerHTML = '';
    loadData('songs').forEach(song => {
      const li = document.createElement('li');
      li.textContent = song;
      list.appendChild(li);
    });
  }

  function addBucket() {
    const input = document.getElementById('bucketInput');
    if (input.value.trim() !== "") {
      const items = loadData('bucket');
      items.push(input.value);
      saveData('bucket', items);
      input.value = '';
      renderBucket();
    }
  }

  function renderBucket() {
    const list = document.getElementById('bucketList');
    list.innerHTML = '';
    loadData('bucket').forEach(item => {
      const li = document.createElement('li');
      li.textContent = item;
      list.appendChild(li);
    });
  }

  function addGoal() {
    const input = document.getElementById('goalInput');
    if (input.value.trim() !== "") {
      const goals = loadData('goals');
      goals.push(input.value);
      saveData('goals', goals);
      input.value = '';
      renderGoals();
    }
  }

  function renderGoals() {
    const list = document.getElementById('goalList');
    list.innerHTML = '';
    loadData('goals').forEach(goal => {
      const li = document.createElement('li');
      li.textContent = goal;
      list.appendChild(li);
    });
  }

  document.getElementById('futureInput').addEventListener('input', function() {
    localStorage.setItem('future', this.value);
  });

  function loadFuture() {
    document.getElementById('futureInput').value = localStorage.getItem('future') || '';
  }

  window.onload = function() {
    renderNotes();
    renderSongs();
    renderBucket();
    renderGoals();
    loadFuture();
  }
</script>

</body>
</html>
